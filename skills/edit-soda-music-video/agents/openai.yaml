interface:
  display_name: "汽水音乐混剪成片"
  short_description: "全量 Read 素材门禁、Whisper 词级字幕与 Remotion 混剪验收"
  default_prompt: "使用 $edit-soda-music-video 完成汽水混剪；生成前先确认 Manifest 覆盖全部图片/视频且每条都有执行模型用 Read 写入的 description，门禁未通过就先完成素材理解；需要自动选材时按 description 做语义匹配，不调用额外模型脚本；若提供口播，必须对当前输入执行 Whisper --word_timestamps True，再把台词填入实际词级时间戳并去除标点。"
