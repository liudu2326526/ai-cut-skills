interface:
  display_name: "汽水音乐混剪成片"
  short_description: "利益点选材、有效区域避挡、Whisper 词级字幕与 Remotion 混剪"
  default_prompt: "使用 $edit-soda-music-video 完成汽水混剪；生成前用 Read 为全部图片/视频写入 description 和源像素 effective_region；只在明确利益点台词中按 description 匹配普通素材，非利益点保持数字人；遮挡和缩放只检查 effective_region 的真实内容，空白画布不算遮挡；若提供口播，必须对当前输入执行 Whisper --word_timestamps True，再把台词填入实际词级时间戳。"
